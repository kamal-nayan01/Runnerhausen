<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Endless Runner Game</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; overflow: hidden; }\n        canvas { background: #000; display: block; margin: auto; }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="480" height="320"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let player, obstacles, score;\n\n        // Player class\n        class Player {\n            constructor() {\n                this.width = 30;\n                this.height = 30;\n                this.x = canvas.width / 2 - this.width / 2;\n                this.y = canvas.height - this.height - 10;\n                this.gravity = 0.5;\n                this.jumpStrength = 10;\n                this.isJumping = false;\n            }\n\n            update() {\n                if (this.isJumping) {\n                    this.y -= this.jumpStrength;\n                    this.jumpStrength -= this.gravity;\n                    if (this.jumpStrength <= 0) {\n                        this.isJumping = false;\n                    }\n                } else if (this.y < canvas.height - this.height - 10) {\n                    this.y += this.gravity;\n                } else {\n                    this.y = canvas.height - this.height - 10;\n                }\n            }\n\n            draw() {\n                ctx.fillStyle = 'white';\n                ctx.fillRect(this.x, this.y, this.width, this.height);\n            }\n\n            jump() {\n                if (this.y >= canvas.height - this.height - 10) {\n                    this.isJumping = true;\n                    this.jumpStrength = 10;\n                }\n            }\n        }\n\n        // Obstacle class\n        class Obstacle {\n            constructor() {\n                this.width = 30;\n                this.height = Math.random() * 20 + 10;\n                this.x = canvas.width;\n                this.y = canvas.height - this.height - 10;\n            }\n\n            update() {\n                this.x -= 5;\n            }\n\n            draw() {\n                ctx.fillStyle = 'red';\n                ctx.fillRect(this.x, this.y, this.width, this.height);\n            }\n        }\n\n        function init() {\n            player = new Player();\n            obstacles = [];\n            score = 0;\n            spawnObstacle();\n            requestAnimationFrame(gameLoop);\n        }\n\n        function spawnObstacle() {\n            obstacles.push(new Obstacle());\n            score++;\n            setTimeout(spawnObstacle, Math.random() * 2000 + 1000);\n        }\n\n        function gameLoop() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            player.update();\n            player.draw();\n            obstacles.forEach((obstacle, index) => {\n                obstacle.update();\n                obstacle.draw();\n                if (obstacle.x < 0) {\n                    obstacles.splice(index, 1);\n                } else if (obstacle.x < player.x + player.width && obstacle.x + obstacle.width > player.x && player.y + player.height > obstacle.y) {\n                    alert('Game Over! Your score: ' + score);\n                    document.location.reload();\n                }\n            });\n            requestAnimationFrame(gameLoop);\n        }\n\n        window.addEventListener('keydown', (event) => {\n            if (event.code === 'Space') {\n                player.jump();\n            }\n        });\n\n        init();\n    </script>\n</body>\n</html>
